global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - 'alert.rules'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:3000']
        labels:
          app: 'gateforge-gateway'
